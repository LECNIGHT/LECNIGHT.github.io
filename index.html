<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LEC Watch Party</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000814">

  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <h1>WATCH PARTY</h1>
  <h2>LEC</h2>

  <div class="info">
    <span>📅 9 MAI</span>
    <span>🕒 16H → 21H</span>
  </div>

  <div class="matches">

    <h3>Matchs au programme</h3>

    <div class="match">
      <div class="team">
        <img src="G2.png">
        <span>G2</span>
      </div>
      <span class="vs">VS</span>
      <div class="team">
        <img src="GX.png">
        <span>GX</span>
      </div>
    </div>

    <div class="match">
      <div class="team">
        <img src="KOI.png">
        <span>KOI</span>
      </div>
      <span class="vs">VS</span>
      <div class="team">
        <img src="KC.png">
        <span>KC</span>
      </div>
    </div>

  </div>

  <div class="gallery">
    <h3>Ambiance 🔥</h3>
    <div class="gallery-scroll">
      <img src="IMG6.jpeg">
      <img src="IMG5.jpeg">
      <img src="IMG1.jpeg">
      <img src="IMG2.jpeg">
      <img src="IMG3.jpeg">
      <img src="IMG4.jpeg">
    </div>
  </div>

  <div class="location">
    📍 Beluchi's – <span>Gare Du Nord</span>
  </div>

  <!-- PROGRESSION -->
  <div class="progress-box">
    <p>Places réservées</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <span id="count">0 / 200</span>
  </div>

  <!-- FORM -->
  <form>

    <input type="text" name="prenom" placeholder="Prénom" required>
    <input type="text" name="nom" placeholder="Nom" required>
    <input type="email" name="email" placeholder="Email" required>

    <input type="hidden" name="choix" id="choix">

    <button type="button" class="btn yes" onclick="setChoice('Présent')">
      ✅ Je viens
    </button>

    <button type="button" class="btn no" onclick="setChoice('Absent')">
      ❌ Je viens pas
    </button>

    <button type="button" class="btn maybe" onclick="setChoice('Peut-être')">
      🔥 Peut-être
    </button>

  </form>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  // 🔥 CONFIG FIREBASE (REMPLACE PAR TES INFOS)
  const firebaseConfig = {
    apiKey: "AIzaSyBFArF1bSDDoDvPCke4bG-SYnfFvIzMZ2A",
    authDomain: "watchpartylec.firebaseapp.com",
    databaseURL: "https://watchpartylec-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "watchpartylec",
    storageBucket: "watchpartylec.firebasestorage.app",
    messagingSenderId: "1:129987337867:web:711a5f3c5ac6f369b0fe8e",
    appId: "XXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const counterRef = db.ref("watchparty/count");

  const MAX_PLACES = 200;

  // 🧠 ID unique utilisateur (anti double vote)
  let userId = localStorage.getItem("userId");
  if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("userId", userId);
  }

  let hasVoted = localStorage.getItem("hasVoted") === "true";

  // ➕ vote
  function setChoice(option) {
    document.getElementById('choix').value = option;

    if (option !== "Présent") return;

    if (hasVoted) {
      alert("❌ Tu as déjà réservé ta place !");
      return;
    }

    counterRef.transaction((current) => {
      current = current || 0;

      if (current >= MAX_PLACES) {
        return current;
      }

      return current + 1;
    }, (error, committed) => {
      if (error) return;

      if (!committed) {
        alert("❌ Places complètes !");
        return;
      }

      hasVoted = true;
      localStorage.setItem("hasVoted", "true");

      alert("✅ Place réservée !");
    });
  }

  // 📡 update live
  counterRef.on("value", (snapshot) => {
    let current = snapshot.val() || 0;

    let percent = (current / MAX_PLACES) * 100;

    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("count").innerText = current + " / " + MAX_PLACES;
  });
</script>

</body>
</html>
